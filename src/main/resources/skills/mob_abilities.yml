# yaml-language-server: $schema=../skills-schema.json
# Skills cast by mob templates (see mobs/frost_wraith.yml), not bound to any
# player command/item. targeter: self for effects centered on the mob
# itself; targeter: radius for anything that should hit whoever's nearby -
# a mob caster has no "crosshair" the way a player does, so single/cone
# targeters aren't useful here.
skills:

  frost_wraith_intro:
    cooldown: 0
    targeter: self
    effects:
      - type: particle
        particle: SNOWFLAKE
        count: 30

  frost_nova:
    cooldown: 4000
    targeter: radius
    radius: 6
    include_self: false
    effects:
      - type: damage
        amount: 4
      - type: knockback
        strength: 1.2
      - type: particle
        particle: SNOWFLAKE
        count: 25

  retaliate_shard:
    cooldown: 2000
    targeter: radius
    radius: 4
    include_self: false
    effects:
      - type: damage
        amount: 3
      - type: particle
        particle: FLAME
        count: 12

  death_burst:
    cooldown: 0
    targeter: radius
    radius: 5
    include_self: false
    effects:
      - type: damage
        amount: 6
      - type: knockback
        strength: 2.0
      - type: particle
        particle: CLOUD
        count: 30

  enrage:
    cooldown: 0
    targeter: self
    effects:
      - type: potion
        effect: SPEED
        duration_ticks: 200
        amplifier: 2
      - type: particle
        particle: FLAME
        count: 20
