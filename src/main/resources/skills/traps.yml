# yaml-language-server: $schema=../skills-schema.json
# Skills that inflict a status (snared/envenomed, defined in statuses.yml)
# on hit rather than damaging directly.

skills:

  # --- the trapper archetype: place a ring on the ground that only the
  # caster can see, sit there for a long time waiting, then damage+root
  # whoever crosses it. Three pieces make this work:
  #   - `anchor: cursor` places it once, at cast time, wherever the caster
  #     is aiming at the ground - it doesn't move after that.
  #   - `visible_to: caster_only` is the actual "invisible to everyone but
  #     the caster" trick - see the Visibility enum on ShapeEffect. The
  #     hitbox itself is still fully server-side and works identically
  #     either way; only the *particles* are hidden from other players.
  #   - `duration_ticks: 6000` (5 minutes) is how long the trap will patiently
  #     sit there waiting for someone to walk over it, and
  #     `disarm_after_hit: true` makes it a single-use trigger: the instant
  #     it lands its first hit, the whole effect ends (particles stop,
  #     hit-scanning stops) instead of running out its full 5 minutes
  #     regardless - so it can't also catch a second victim afterward.
  # `include_self: false` (spelled out below even though it's the default)
  # is what stops the trap from triggering on the caster who placed it.
  hunters_snare:
    cooldown: 15000
    targeter: self # the shape's own cursor anchor does the actual placement
    cost:
      type: stamina
      amount: 20
    effects:
    - type: shape
      anchor: cursor
      cursor_range: 20
      duration_ticks: 6000 # up to 5 minutes for someone to walk into it
      interval_ticks: 10 # redraw every 0.5s - only the caster ever sees it, no need for it to be smooth
      visible_to: caster_only # <- the whole trick
      disarm_after_hit: true # single-use: gone the instant it catches someone
      hit_radius: 1.6 # matches the ring's own radius below
      hit_area: disk # the area the ring encloses, not just its outline
      hit_height: 1.3 # roughly knee-to-chest height, so it catches anyone walking through
      hit_interval_ticks: 2 # check for a victim far more often than it redraws
      hit_once: true
      include_self: false # never triggers on whoever placed it (default - spelled out on purpose)
      on_hit:
      # on_hit effects are independent of the shape's own visible_to -
      # `particle` here is a normal broadcast, visible to everyone,
      # which is what you want: the SETUP is hidden, but the "gotcha"
      # moment when it actually springs should be obvious to the victim
      # (and anyone else nearby) rather than a damage number appearing
      # from nowhere.
      - type: particle
        particle: DUST
        color: { r: 90, g: 60, b: 30 }
        count: 20
      - type: damage
        amount: 8
      layers:
      - shape: ring
        particle: DUST
        color: { r: 90, g: 60, b: 30 } # earthy brown - a snare, not a glowy magic circle
        dust_size: 1.3
        radius: 1.6
        points: 28
        y_offset: 0.05

  # --- a second trap flavor, same building blocks: a smaller, faster-acting
  # trap that inflicts a poison DoT (`envenomed`) instead of a root. Also
  # demonstrates leaving `disarm_after_hit` at its default (false): this one
  # stays active and can catch multiple different intruders one after
  # another (each individual entity still only triggers it once, via
  # `hit_once`) instead of vanishing after its first victim - a defensive
  # ward around a camp/chokepoint rather than a single kill-shot.
  venom_dart_trap:
    cooldown: 12000
    targeter: self
    cost:
      type: stamina
      amount: 15
    effects:
    - type: shape
      anchor: cursor
      cursor_range: 15
      duration_ticks: 12000 # up to 10 minutes, and it can trigger repeatedly
      interval_ticks: 10
      visible_to: caster_only
      hit_radius: 1.0
      hit_area: disk
      hit_height: 1.0
      hit_interval_ticks: 2
      hit_once: true # ...per entity - doesn't disarm the trap itself
      include_self: false
      on_hit:
      - type: particle
        particle: DUST
        color: { r: 90, g: 200, b: 40 }
        count: 16
      - type: damage
        amount: 3
      layers:
      - shape: ring
        particle: DUST
        color: { r: 90, g: 200, b: 40 }
        dust_size: 1.1
        radius: 1.0
        points: 20
        y_offset: 0.05
