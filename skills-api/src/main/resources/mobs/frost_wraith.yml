# Mob templates. Spawn with /skillsapi spawnmob <templateId>. Each `skills:`
# entry binds an existing skill (from skills/*.yml) to a trigger - the mob
# itself is that skill's caster. See USAGE.md's Mob templates / Mob skills &
# triggers sections for the full field list.
mobs:

  frost_wraith:
    type: WITHER_SKELETON
    display_name: "&bFrost Wraith"
    health: 60
    equipment:
      main_hand: DIAMOND_SWORD
      helmet: BLUE_ICE
    armor: 4
    move_speed: 1.0
    despawn: false
    skills:
      - trigger: on_spawn
        skill: frost_wraith_intro
      - trigger: on_timer
        interval_ticks: 100
        skill: frost_nova
        chance: 0.5
      - trigger: on_damaged
        skill: retaliate_shard
        cooldown: 3000
      - trigger: on_death
        skill: death_burst
      - trigger: on_low_health
        health_percent: 0.3
        skill: enrage
