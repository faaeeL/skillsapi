# yaml-language-server: $schema=../skills-schema.json
# Custom particle geometry - rings, domes, beams, cubes - via `shape`
# layers. See the shape/sequence sections of USAGE.md for the field
# reference; these are worked examples.

skills:

  # A summoning circle that spins under the caster, then a ring of blades
  # (drawn with the same RING shape at a bigger radius, spinning the other
  # way) slashes outward once and damages anyone it catches.
  arcane_domain:
    cooldown: 14000
    cast_time: 1200
    interruptible: true
    telegraph:
      particle: WITCH
      particle_count: 4
      interval_ticks: 4
    targeter: self
    cost:
      type: mana
      amount: 35
    effects:
      - type: shape
        anchor: self             # stays centered on the caster, follows them
        duration_ticks: 60
        interval_ticks: 2
        hit_radius: 1.0
        hit_once: true
        debug_hitbox: false      # flip to true while tuning hit_radius - draws it in red
        on_hit:
          - type: damage
            amount: 9
          - type: knockback
            strength: 1.0
        layers:
          - shape: ring           # the ground rune - flat, doesn't spin with your view
            radius: 2.2
            points: 30
            particle: SOUL_FIRE_FLAME
            y_offset: 0.05
            rotate_deg_per_sec: 90
          - shape: ring           # the outer blade-ring - spins the opposite way, faster
            radius: 3.4
            points: 20
            particle: CRIT
            y_offset: 0.1
            rotate_deg_per_sec: -260
          - shape: helix          # a rising spiral of motes tying the two rings together
            radius: 1.4
            height: 2.5
            turns: 2.5
            points: 40
            particle: END_ROD
            rotate_deg_per_sec: 140
            rise_per_sec: 0.6

  # A traveling wedge of blades - the shape moves forward like a projectile,
  # and anything caught in the arc as it passes gets hit once.
  blade_fan:
    cooldown: 9000
    cast_time: 400
    targeter: self
    cost:
      type: stamina
      amount: 25
    effects:
      - type: shape
        anchor: self_fixed        # spawns at the caster, then travel takes over
        duration_ticks: 30
        interval_ticks: 1
        hit_radius: 1.1
        hit_once: true
        travel:
          speed: 14
          max_distance: 10
          collide_with_blocks: true
        on_hit:
          - type: damage
            amount: 7
        layers:
          - shape: cone            # a filled wedge in front, facing however you're aiming
            radius: 2.5
            arc_degrees: 70
            rings: 3
            points: 30
            particle: SWEEP_ATTACK
            rotate_deg_per_sec: 720   # spins fast as it flies - the "fan of blades" look

  # A ground-targeted dome: aim at a spot, a dome of light rises and pulses
  # there for a couple seconds, damaging anyone standing inside on a tick.
  sanctuary_dome:
    cooldown: 16000
    cast_time: 600
    targeter: self
    cost:
      type: mana
      amount: 30
    effects:
      - type: shape
        anchor: cursor            # centers on wherever you're looking (ground/wall)
        cursor_range: 15
        offset:
          y: 0.5                   # lift it slightly so the dome's base isn't clipped into the ground
        duration_ticks: 50
        interval_ticks: 2
        hit_radius: 1.3
        hit_once: false            # ticks repeatedly on anyone standing inside
        hit_interval_ticks: 10
        on_hit:
          - type: heal             # swap to `damage` for a hostile version
            amount: 2
        layers:
          - shape: half_sphere
            radius: 2.2
            points: 50
            particle: END_ROD
            scale_start: 0.1
            scale_end: 1.0          # grows in over the first ~1s
            pulsate_amplitude: 0.08
            pulsate_frequency: 0.8

  # A ground-rune heal: the ring is purely visual (a thin outline), but the
  # hitbox is the whole disk it encloses - anyone standing anywhere inside
  # the circle gets ticked, not just people standing on the line itself.
  # That's what `hit_area: disk` is for (default `hit_area: points` would
  # only hit a thin band right along the ring's particles).
  heal_circle:
    cooldown: 10000
    cast_time: 1200
    targeter: radius
    radius: 5
    cost:
      type: mana
      amount: 20
    effects:
      - type: shape
        anchor: self
        offset:
          y: 0.1
        duration_ticks: 40
        interval_ticks: 1
        hit_area: disk        # whole interior of the circle counts, not just the ring line
        hit_radius: 5          # matches the ring's visual radius below
        hit_height: 2          # catches standing/jumping players (checked above and below center)
        hit_once: false
        hit_interval_ticks: 20 # heal tick once per second per player while they're standing inside
        include_self: true
        on_hit:
          - type: heal
            amount: 5
        debug_hitbox: true     # flip off once you're happy with the radius/height
        layers:
          - shape: ring          # visual only - just the outline
            radius: 5
            points: 30
            particle: END_ROD

  # A column of light striking down where you're looking - the `cylinder`
  # shape is a hollow tube (stacked rings), so this is a light-beam/pillar
  # rather than the flat things above. scale_start -> scale_end makes it
  # erupt up to full height fast instead of just appearing all at once.
  light_beam_strike:
    cooldown: 12000
    cast_time: 500
    targeter: self
    cost:
      type: mana
      amount: 25
    effects:
      - type: shape
        anchor: cursor
        cursor_range: 20
        duration_ticks: 20        # quick - about a second
        interval_ticks: 1
        hit_area: disk             # anyone inside the column's footprint, at any height in it
        hit_radius: 1.2
        hit_height: 4
        hit_once: true
        on_hit:
          - type: damage
            amount: 14
        debug_hitbox: true
        layers:
          - shape: cylinder          # the hollow tube of the beam itself
            radius: 0.6
            height: 6
            rings: 10                # cross-sections stacked up the tube
            points: 80
            particle: END_ROD
            scale_start: 0.1
            scale_end: 1.0            # erupts up to full height fast
            scale_axis: vertical      # height-only - radius stays 0.6 the whole time, no ballooning
          - shape: helix               # a bit of spiraling energy climbing the beam
            radius: 0.3
            height: 6
            turns: 3
            points: 40
            particle: SOUL_FIRE_FLAME
            rotate_deg_per_sec: 400
          - shape: ring                 # impact ring at the base
            radius: 1.5
            points: 24
            particle: CRIT
            y_offset: 0.05
            scale_start: 0.2
            scale_end: 1.0

  # A custom shape defined by formulas instead of a fixed shape: type.
  # This one is a 5-petal rose curve (r = cos(5*theta)) laid flat on the
  # ground, gently breathing via scale_start/scale_end + pulsate like any
  # other layer - the parametric formula only decides the base point cloud,
  # every existing animation field still applies on top of it.
  rose_bloom:
    cooldown: 8000
    targeter: self
    cast_time: 200
    cost:
      type: mana
      amount: 18
    effects:
      - type: shape
        anchor: cursor
        cursor_range: 20
        duration_ticks: 40
        layers:
          - shape: parametric
            particle: DUST
            color: { r: 230, g: 60, b: 130 }
            dust_size: 1.3
            points: 200
            # theta sweeps 0..2pi as t goes 0..1; r = cos(5*theta) is the
            # classic rose-curve formula - 5 petals since the coefficient
            # is odd (an even coefficient draws twice as many, half-overlapping)
            formula_x: "cos(5 * t * tau) * cos(t * tau) * 3"
            formula_y: "0"
            formula_z: "cos(5 * t * tau) * sin(t * tau) * 3"
            rotate_deg_per_sec: 30
            scale_start: 0.2
            scale_end: 1.0
            pulsate_amplitude: 0.05
            pulsate_frequency: 0.5

  # --- a beam that shoots exactly where the caster is looking, including
  # straight up/down. `line` is already facing-relative (see the shape types
  # table in USAGE.md) - it's built pointing along the caster's current look
  # direction every render tick, so this just works with no extra config.
  # `anchor: self` re-reads the caster's position AND aim every tick, so the
  # beam tracks live while it's active - hold the cast and sweep it across
  # targets like a held laser rather than a single locked shot.
  laser_beam:
    cooldown: 6000
    targeter: self             # the shape's own facing-relative line does the aiming
    cost:
      type: mana
      amount: 20
    effects:
      - type: shape
        anchor: self
        duration_ticks: 20      # 1s beam
        interval_ticks: 1
        offset:
          y: 1.5                 # start at eye height, not the feet
        hit_radius: 0.4          # thin beam - see hit_area note below
        hit_area: points          # tests along the actual rendered line, not a disk/sphere
        hit_once: false            # keep hurting whatever's standing in the beam
        hit_interval_ticks: 4       # ...but only every 4 ticks, not every single tick
        on_hit:
          - type: damage
            amount: 4
        layers:
          - shape: line
            particle: END_ROD
            particle_count: 1
            points: 40             # density along the beam - keep this high relative
            length: 25              # to length so hit_area: points doesn't leave gaps

  # --- same idea as laser_beam, but thick: `cylinder` with `facing_relative:
  # true` reorients its long axis from world-up (the standing pillar you'd
  # get by default - see light_beam_strike) to the caster's aim instead, so
  # it becomes a barrel shooting forward rather than a column growing
  # upward. No math functions needed - just the one flag.
  beam_cannon:
    cooldown: 8000
    targeter: self
    cost:
      type: mana
      amount: 30
    effects:
      - type: shape
        anchor: self
        duration_ticks: 16
        interval_ticks: 1
        offset:
          y: 1.5
        hit_radius: 1.0           # thicker than laser_beam - matches the visual width
        hit_area: points
        hit_once: false
        hit_interval_ticks: 4
        on_hit:
          - type: damage
            amount: 5
        layers:
          - shape: cylinder
            particle: DUST
            color: { r: 120, g: 200, b: 255 }
            dust_size: 1.4
            radius: 0.8             # the barrel's thickness
            height: 20               # the barrel's reach (its "long axis" now, not vertical height)
            rings: 10
            points: 200
            facing_relative: true    # <- this is the whole trick
            rotate_deg_per_sec: 200   # still spins around its own long axis, same as ever

  # --- `box`, the other new shape: `facing_relative: true` gets the same
  # beam-mode convention as line/cylinder (extends from 0 to `length` along
  # the caster's aim); `random_distribution: true` scatters points across
  # the 6 faces for a rougher/energy look instead of a crisp wireframe.
  # Paired here with `travel` for a slow, tumbling cube bolt rather than an
  # instant beam - travel launches it, then it flies under its own
  # velocity (see the `travel` + anchor caveat in USAGE.md's combination guide).
  arcane_cube_bolt:
    cooldown: 5000
    targeter: self
    cost:
      type: mana
      amount: 15
    effects:
      - type: shape
        anchor: self_fixed        # launch point only - travel takes over from there
        duration_ticks: 40
        interval_ticks: 1
        offset:
          y: 1.5
        travel:
          speed: 18
          max_distance: 20
          gravity: false
          collide_with_blocks: true
        hit_radius: 1.2
        hit_area: points
        hit_once: true
        on_hit:
          - type: damage
            amount: 10
        layers:
          - shape: box
            particle: DUST
            color: { r: 190, g: 60, b: 255 }
            dust_size: 1.5
            width: 1.4
            height: 1.4
            length: 1.4              # a cube, not a slab - width = height = length
            random_distribution: true # glowing scattered faces instead of crisp edges
            facing_relative: true      # oriented along its flight direction
            rotate_x_deg_per_sec: 140   # tumbles as it flies
            rotate_deg_per_sec: 90
            rotate_z_deg_per_sec: 60
