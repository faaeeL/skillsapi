# yaml-language-server: $schema=../skills-schema.json
# The two big multi-stage skills: telegraphed windups that chain into a
# `sequence` of shape effects. These are the deepest-nested skills in the
# whole set - everything else is much flatter.

skills:

  # --- chained multi-stage ultimate: a `sequence` effect strung across two
  # places - inside the telegraph windup (pure visual, builds anticipation)
  # and again after the cast resolves (the actual payoff, ending in damage).
  # Each step waits for its own shape's duration_ticks before the next one
  # starts, so the stages play back to back automatically.
  arcane_judgement:
    cooldown: 20000
    cast_time: 2000            # 2s windup - the sequence below spans it
    interruptible: true
    targeter: self
    cost:
      type: mana
      amount: 50
    telegraph:
      # no particle/sound given - on_start's own sequence IS the tell,
      # so the simple looping cue is just left unused here
      on_start:
        - type: sequence
          steps:
            # stage 1: a small warning glyph appears at the caster's feet
            - effects:
                - type: shape
                  anchor: self
                  duration_ticks: 20   # 1s - next step auto-waits this long
                  interval_ticks: 2
                  layers:
                    - shape: ring
                      radius: 1.5
                      points: 20
                      particle: SOUL_FIRE_FLAME
                      scale_start: 0.0
                      scale_end: 1.0
            # stage 2: it widens into a bigger warning ring - still no damage,
            # this whole sequence is running during the windup, dodgeable
            - effects:
                - type: shape
                  anchor: self
                  duration_ticks: 20
                  interval_ticks: 2
                  layers:
                    - shape: ring
                      radius: 3.5
                      points: 30
                      particle: END_ROD
                      rotate_deg_per_sec: 120
    effects:
      # this is the "outside the telegraph" half - only runs once cast_time
      # finishes (i.e. the windup completed and wasn't interrupted)
      - type: sequence
        steps:
          # stage 3: the pillar erupts upward (vertical-only scale, see
          # scale_axis above - radius stays fixed, no ballooning)
          - effects:
              - type: shape
                anchor: self
                duration_ticks: 12
                interval_ticks: 1
                layers:
                  - shape: cylinder
                    radius: 1.8
                    height: 5
                    rings: 8
                    points: 60
                    particle: END_ROD
                    scale_start: 0.05
                    scale_end: 1.0
                    scale_axis: vertical
          # stage 4: the finishing burst - this is the step that actually
          # hurts. Fired only once stage 3's pillar has fully risen.
          - effects:
              - type: shape
                anchor: self
                duration_ticks: 6
                interval_ticks: 1
                hit_area: disk
                hit_radius: 3.5
                hit_height: 4
                hit_once: true
                on_hit:
                  - type: damage
                    amount: 22
                layers:
                  - shape: sphere
                    radius: 3.5
                    points: 80
                    particle: EXPLOSION
                    scale_start: 0.3
                    scale_end: 1.0

  # --- big ground-targeted ultimate: three colored rings (red/green/blue)
  # close in from a wide radius and converge at one point, then - a beat
  # later - a large light pillar erupts there and hits everything inside it.
  # `color:` on a `dust` layer needs Particle.DUST + a plain RGB triple;
  # `scale_axis: radial` keeps the closing rings flat while they shrink, and
  # the pillar's `scale_axis: vertical` (see ShapeLayer.ScaleAxis) makes it
  # shoot straight up at full radius instead of ballooning outward.
  trinity_pillar:
    cooldown: 24000
    cast_time: 500              # short windup before the convergence starts
    interruptible: true
    telegraph:
      particle: END_ROD
      particle_count: 4
      interval_ticks: 4
    targeter: self               # the shape effect below does its own cursor targeting
    cost:
      type: mana
      amount: 55
    effects:
      - type: sequence
        steps:
          # stage 1: red, green, and blue rings each start at their OWN spot
          # (6 blocks out from the target, 120 degrees apart) and slide in
          # over 1.5s via start_offset -> end_offset {0,0,0}, converging on
          # the targeted spot together - purely visual, nothing here deals
          # damage yet
          - effects:
              - type: shape
                anchor: cursor_locked   # resolves the aim once - stage 2's pillar reuses this exact point
                cursor_range: 25
                duration_ticks: 30      # 1.5s - next step auto-waits this long
                interval_ticks: 1
                offset:
                  y: 0.1
                layers:
                  - shape: ring
                    radius: 2.2
                    points: 40
                    particle: DUST
                    color: { r: 255, g: 40, b: 40 }
                    dust_size: 1.6
                    rotate_deg_per_sec: 90
                    scale_start: 1.0
                    scale_end: 0.6
                    scale_axis: radial
                    start_offset: { x: 6.0, z: 0.0 }     # 0 degrees, 6 blocks out
                    end_offset: { x: 0.0, z: 0.0 }       # slides in to the shared center
                  - shape: ring
                    radius: 2.2
                    points: 40
                    particle: DUST
                    color: { r: 40, g: 255, b: 60 }
                    dust_size: 1.6
                    rotate_deg_per_sec: -110
                    scale_start: 1.0
                    scale_end: 0.6
                    scale_axis: radial
                    y_offset: 0.05
                    start_offset: { x: -3.0, z: 5.196 }  # 120 degrees, 6 blocks out
                    end_offset: { x: 0.0, z: 0.0 }
                  - shape: ring
                    radius: 2.2
                    points: 40
                    particle: DUST
                    color: { r: 50, g: 90, b: 255 }
                    dust_size: 1.6
                    rotate_deg_per_sec: 140
                    scale_start: 1.0
                    scale_end: 0.6
                    scale_axis: radial
                    y_offset: 0.1
                    start_offset: { x: -3.0, z: -5.196 } # 240 degrees, 6 blocks out
                    end_offset: { x: 0.0, z: 0.0 }
          # stage 2: fires once the rings finish converging - a big pillar of
          # light erupts (height-only scale, radius stays full-size the
          # whole way up) and hits everything standing in its footprint
          - effects:
              - type: shape
                anchor: cursor_locked   # reuses stage 1's locked point - always erupts exactly where the rings converged
                cursor_range: 25
                duration_ticks: 24
                interval_ticks: 1
                hit_area: disk
                hit_radius: 4.5           # big AoE footprint
                hit_height: 8
                hit_once: true
                on_hit:
                  - type: damage
                    amount: 26
                  - type: particle
                    particle: EXPLOSION
                    count: 1
                debug_hitbox: false
                layers:
                  - shape: cylinder
                    radius: 2.2            # big pillar
                    height: 10             # big pillar
                    points: 260            # scattered mode has no "rings", so bump the raw count for density
                    particle: END_ROD
                    scale_start: 1.0       # full height/width from the first frame -
                    scale_end: 1.0         # it's not growing, it's dropping in
                    scale_axis: vertical
                    random_distribution: true  # scatters points randomly across the tube instead of clean stacked rings
                    radius_jitter: 0.25        # +/-25% radius wobble per point - breaks up the smooth surface look
                    start_offset: { y: 22.0 }  # spawns 22 blocks up in the sky
                    end_offset: { y: 0.0 }     # and slams down onto the target over duration_ticks
                  - shape: ring             # bright ring flaring out at the base on impact
                    radius: 4.5
                    points: 36
                    particle: FLAME
                    y_offset: 0.05
                    scale_start: 0.1
                    scale_end: 1.0
                    scale_axis: radial
