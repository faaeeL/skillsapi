# yaml-language-server: $schema=../skills-schema.json
# --- the threat/taunt system: nearby hostile Monsters now keep fighting
# whoever's actually generated the most threat against them (damage dealt,
# or an explicit `type: taunt`), instead of purely re-picking whoever's
# nearest - see ThreatManager/ThreatListener. Ordinary damage already
# generates threat on its own with zero config; `taunt` is the dedicated
# tool for a low-damage tank to reliably hold aggro anyway.
skills:

  shield_slam:
    cooldown: 6000
    targeter: cone
    range: 4
    angle: 70
    cost: { type: mana, amount: 15 }
    effects:
      - type: damage
        amount: 3               # deliberately small - a tank isn't meant to out-damage the party's DPS
      - type: taunt
        amount: 1500             # comfortably ahead of anything a real attack rotation would build up
      - type: knockback
        strength: 0.4

  # A ranged, no-damage taunt - useful the instant a fight starts (pull one
  # specific mob onto you before it's even hit anyone) or to peel a mob that
  # wandered onto someone squishier mid-fight.
  provoke:
    cooldown: 10000
    targeter: single
    range: 15
    cost: { type: mana, amount: 10 }
    effects:
      - type: particle
        particle: ANGRY_VILLAGER
        count: 8
      - type: taunt
        amount: 2000
