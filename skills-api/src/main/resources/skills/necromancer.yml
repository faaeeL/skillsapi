# yaml-language-server: $schema=../skills-schema.json
# --- a small necromancer/summoner kit built on `type: summon` and
# `type: dismiss_summons` - see USAGE.md's "summon" section for the full
# field list. Nothing here needs `shape`/`sequence` at all.
skills:

  raise_skeleton:
    cooldown: 6000
    targeter: self
    cost: { type: mana, amount: 20 }
    effects:
      - type: summon
        entity: SKELETON
        count: 1
        spawn_radius: 1.5
        name: "Skeletal Thrall"
        health: 20
        main_hand: BOW
        duration_ticks: -1       # lives until it dies or is dismissed
        max_active: 4            # a 5th raise_skeleton cast just fails until one dies/is dismissed
        on_cap_exceeded: refuse
        aggro_radius: 14
        follow_radius: 10
        move_speed: 1.0
        on_summon:
          - type: particle
            particle: SOUL
            count: 20

  # A full necromancer army, not just one thrall - the same summon effect,
  # just with count > 1 and a higher cap. Longer cooldown to compensate for
  # spawning 3 at once instead of topping up one at a time.
  raise_horde:
    cooldown: 20000
    targeter: self
    cost: { type: mana, amount: 45 }
    effects:
      - type: summon
        entity: ZOMBIE
        count: 3
        spawn_radius: 2.5
        name: "Risen Thrall"
        health: 16
        duration_ticks: -1
        max_active: 6
        on_cap_exceeded: dismiss_oldest # topping up a full horde retires the oldest members instead of just failing
        aggro_radius: 14
        follow_radius: 12
        move_speed: 1.05
        on_summon:
          - type: particle
            particle: SOUL
            count: 15

  # Wolves via setOwner-style loyalty aren't used here on purpose - `summon`
  # doesn't special-case Tameable entities, so every minion (hostile or
  # otherwise) gets the same owner-tag + SummonAiTask treatment uniformly.
  # A wolf minion works fine, it just doesn't get vanilla taming perks (sit,
  # breeding, etc.) on top - it's driven the same as the skeletons/zombies above.
  summon_wolf:
    cooldown: 15000
    targeter: self
    cost: { type: mana, amount: 25 }
    effects:
      - type: summon
        entity: WOLF
        count: 1
        name: "Grave Hound"
        health: 30
        duration_ticks: -1
        max_active: 2
        aggro_radius: 16
        follow_radius: 8
        move_speed: 1.1

  # The "recall" half of the kit - clears the caster's whole board instead
  # of waiting out duration_ticks (which is -1/indefinite on all three
  # skills above anyway, so this is the only way to retire them on demand).
  recall_the_dead:
    cooldown: 2000
    targeter: self
    effects:
      - type: dismiss_summons
      - type: particle
        particle: SOUL
        count: 30
