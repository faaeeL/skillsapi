# yaml-language-server: $schema=../skills-schema.json
# --- reusable status *definitions* - referenced by id from any skill's
# effects (`type: status, status: <id>`), so you don't have to repeat the
# same config in every skill that inflicts it. A one-off status that only
# one skill ever uses (see wind_step's dash, below) doesn't need an entry
# here at all - it can just be defined inline where it's used instead.
statuses:

  frozen:
    behavior: frozen            # built-in: locks velocity to 0 every tick
    duration_ticks: 60          # 3s
    tick_interval_ticks: 5
    on_start:
      - type: particle
        particle: SNOWFLAKE
        count: 25
      - type: potion             # visual/UX cue alongside the actual lock
        effect: SLOWNESS
        duration_ticks: 60
        amplifier: 5
    on_tick:
      - type: particle
        particle: SNOWFLAKE
        count: 3
    on_expire:
      - type: particle           # little "shatter" burst when it wears off
        particle: CLOUD
        count: 12


