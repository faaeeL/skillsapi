name: SkillsAPI
version: '${version}'
main: com.example.skillsapi.SkillsPlugin
api-version: '1.21.11'
author: you
commands:
  cast:
    description: Cast a skill by id
    usage: /cast <skillId>
  skillsapi:
    description: Reload configs, bind/unbind a skill to your held item, or spawn a mob template
    usage: /skillsapi <reload|bind|unbind|spawnmob>
permissions:
  skillsapi.reload:
    description: Allows reloading skills.yml/resources.yml/mobs.yml with /skillsapi reload
    default: op
  skillsapi.bind:
    description: Allows binding a skill to a held item with /skillsapi bind, so right-clicking it casts that skill
    default: op
  skillsapi.spawnmob:
    description: Allows spawning a mobs/*.yml template with /skillsapi spawnmob <templateId>
    default: op
